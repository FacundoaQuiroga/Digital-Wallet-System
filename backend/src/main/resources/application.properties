spring.application.name=sistema-billetera

spring.datasource.url=jdbc:postgresql://localhost:5432/sistema_billetera
spring.datasource.username=billetera_user
spring.datasource.password=billetera_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080